<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 30px;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>

<body>
<h1>Tic Tac Toe</h1>

<p id="message">Player#1's turn</p>

<div id="board"></div>

<script>
    let board = [0,0,0,0,0,0,0,0,0];
    let gameOver = false;

    // Display the current board on the web page
    function drawBoard() {
        const boardDiv = document.getElementById("board");
        boardDiv.innerHTML = "";

        for (let i = 0; i < 9; i++) {
            const button = document.createElement("button");
            button.className = "cell";

            if (board[i] === 1) {

                button.textContent = "X";
            }

            else if (board[i] === 2) {

                button.textContent = "O";
            }

            else {
                button.textContent = "";
            }

            button.onclick = () => playerMove(i);
            boardDiv.appendChild(button);
        }
    }

    function checkWin(player) {
        const wins = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        return wins.some(w => board[w[0]] === player && board[w[1]] === player && board[w[2]] === player);
    }

    function isFull() {
        return board.every(cell => cell !== 0);
    }

    // Handle human move and communicate with MoveServlet
    async function playerMove(index) {
        if (gameOver) {
            return;
        }

        if (board[index] !== 0) {
            document.getElementById("message").textContent = "Invalid move!";
            return;
        }

        board[index] = 1;
        drawBoard();

        if (checkWin(1)) {
            document.getElementById("message").textContent = "Player#1 won!";
            gameOver = true;
            return;
        }

        if (isFull()) {
            document.getElementById("message").textContent = "It is a draw!";
            gameOver = true;
            return;
        }

        document.getElementById("message").textContent = "Player#2's turn";

        const boardString = board.join("");

        // Send board to MoveServlet and wait for JSON response
        const response = await fetch("move?board=" + boardString);

        // Json response from server
        const data = await response.json();

        // extracts board from Json response
        board = data.board.split("").map(Number);

        drawBoard();

        if (checkWin(2)) {
            document.getElementById("message").textContent = "Player#2 won!";
            gameOver = true;
            return;
        }

        if (isFull()) {
            document.getElementById("message").textContent = "It is a draw!";
            gameOver = true;
            return;
        }

        document.getElementById("message").textContent = "Player#1's turn";
    }

    drawBoard();
</script>
</body>
</html>
